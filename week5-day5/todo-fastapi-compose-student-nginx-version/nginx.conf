# Nginx는 이번 확장 실습에서 "프론트엔드 서버 + API 프록시" 역할을 합니다.
# 브라우저는 http://localhost:8080 으로 Nginx에 접속합니다.
# Nginx는 HTML/CSS/JS 파일을 직접 내려주고, /api 요청만 FastAPI backend로 전달합니다.

server {
    # 컨테이너 내부에서 Nginx가 80번 포트로 요청을 받습니다.
    # docker-compose.yml에서 host 8080 -> container 80 으로 연결합니다.
    listen 80;
    server_name _;

    # Nginx 공식 이미지의 정적 파일 기본 위치입니다.
    # docker-compose.yml에서 ./static 폴더를 이 위치에 읽기 전용으로 마운트합니다.
    root /usr/share/nginx/html;
    index index.html;

    # 프론트엔드 라우트입니다.
    # 지금은 단일 index.html 앱이므로 / 로 들어오면 index.html을 내려줍니다.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 라우트입니다.
    # 브라우저 -> Nginx: /api/todos
    # Nginx -> FastAPI backend: http://backend:8000/api/todos
    # 여기서 backend는 docker-compose.yml의 서비스 이름입니다.
    location /api/ {
        proxy_pass http://backend:8000;

        # 아래 헤더들은 FastAPI가 원래 요청 정보를 알 수 있게 전달합니다.
        # 실습에서는 필수는 아니지만, 실제 서비스 프록시 구성에서 자주 등장합니다.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 수업 중 네트워크가 느리거나 RDS 첫 연결이 늦어도 바로 끊기지 않게 여유를 둡니다.
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
